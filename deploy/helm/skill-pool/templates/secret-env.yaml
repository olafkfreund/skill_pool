{{- /*
SECRET REFERENCES — DOCUMENTATION ONLY.

This chart deliberately does NOT create the database or app Secrets.
Operators provide them through one of:
  * `kubectl create secret generic ...`
  * external-secrets / sealed-secrets / sops / Vault
  * cloud-native secret-managers (AWS Secrets Manager + IRSA, etc.)

The Deployments mount them via `envFrom` — see `server.envFrom` and
`migrate.envFrom` in values.yaml. Defaults expect:

  Secret: skill-pool-db
    SKILL_POOL_DATABASE_URL=postgres://user:pw@host:5432/dbname
    # optional:
    SKILL_POOL_DATABASE_READ_URL=postgres://user:pw@replica:5432/dbname

  Secret: skill-pool-secrets   (optional)
    SKILL_POOL_EMAIL_SECRET_KEY=<32-byte hex>
    # SCIM / OIDC / SMTP secrets as needed by your tenants

A pre-install validation hook below fails the release fast when the
DB secret is missing, so we don't end up with a CrashLoopBackOff.
*/ -}}
{{- $required := list }}
{{- range .Values.server.envFrom }}
  {{- with .secretRef }}
    {{- if not .optional }}
      {{- $required = append $required .name }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if $required }}
# Pre-install / pre-upgrade check: ensure every required Secret exists.
# Runs `kubectl get secret` and fails the release if any are missing.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "skill-pool.fullname" . }}-required-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skill-pool.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  required-secrets.txt: |
    {{- range $required }}
    {{ . }}
    {{- end }}
{{- end -}}
