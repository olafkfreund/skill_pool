apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skill-pool.server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skill-pool.server.labels" . | nindent 4 }}
spec:
  {{- if not .Values.server.hpa.enabled }}
  replicas: {{ .Values.server.replicas }}
  {{- end }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "skill-pool.server.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "skill-pool.server.labels" . | nindent 8 }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Re-roll on config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "skill-pool.serviceAccountName" . }}
      # Token automount mirrors the ServiceAccount default; explicit here
      # so a future SA edit doesn't silently flip pod behaviour.
      automountServiceAccountToken: {{ if .Values.aws.irsa.roleArn }}true{{ else }}false{{ end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: server
          image: {{ include "skill-pool.server.image" . | quote }}
          imagePullPolicy: {{ .Values.image.server.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "skill-pool.server.fullname" . }}-env
            {{- with .Values.server.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.server.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /v1/healthz
              port: http
            initialDelaySeconds: {{ .Values.server.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.server.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /v1/healthz
              port: http
            initialDelaySeconds: {{ .Values.server.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.server.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            # Rust + sqlx sometimes need a writable /tmp despite the
            # read-only rootfs; mount a tmpfs.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
