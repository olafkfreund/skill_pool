{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "skill-pool.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skill-pool.labels" . | nindent 4 }}
  {{- if or .Values.serviceAccount.annotations .Values.aws.irsa.roleArn }}
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.aws.irsa.roleArn }}
    eks.amazonaws.com/role-arn: {{ . | quote }}
    {{- end }}
  {{- end }}
# Token automount: IRSA needs it; without IRSA we save a syscall by disabling.
automountServiceAccountToken: {{ if .Values.aws.irsa.roleArn }}true{{ else }}false{{ end }}
{{- end -}}
