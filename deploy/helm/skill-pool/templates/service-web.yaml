apiVersion: v1
kind: Service
metadata:
  name: {{ include "skill-pool.web.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skill-pool.web.labels" . | nindent 4 }}
  {{- with .Values.web.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "skill-pool.web.selectorLabels" . | nindent 4 }}
