{{- if .Values.networkPolicy.enabled -}}
{{- /*
NetworkPolicy — ingress lockdown for server + web.

By default we allow ingress only from peers in `networkPolicy.ingressFrom`.
Cross-pod traffic inside the release (web -> server) is always allowed
via an extra `podSelector` rule.

Egress is left open unless `networkPolicy.egress` is set. Typical egress
allow-list:
  * Postgres (managed) on 5432/tcp
  * S3 / object store on 443/tcp
  * cluster DNS on 53/udp+tcp
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skill-pool.server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skill-pool.server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "skill-pool.server.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress }}
    - Egress
    {{- end }}
  ingress:
    # Allow web tier -> server (in-cluster API calls).
    - from:
        - podSelector:
            matchLabels:
              {{- include "skill-pool.web.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    {{- with .Values.networkPolicy.ingressFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skill-pool.web.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skill-pool.web.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "skill-pool.web.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress }}
    - Egress
    {{- end }}
  ingress:
    {{- with .Values.networkPolicy.ingressFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: 3000
    {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}
