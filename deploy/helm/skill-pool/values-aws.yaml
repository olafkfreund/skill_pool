# AWS-specific overlay for the skill-pool Helm chart.
#
# Apply with:
#   helm install skill-pool ./deploy/helm/skill-pool \
#     -f deploy/helm/skill-pool/values-aws.yaml \
#     --create-namespace -n skill-pool
#
# Every `""` value below is intentionally blank — fill from your
# `terraform output` (see deploy/terraform/aws/README.md §"What you'll
# need to paste elsewhere after apply").

# ---------------------------------------------------------------------
# Ingress — ALB via AWS Load Balancer Controller.
#
# TLS strategy: **nip.io + cert-manager + Let's Encrypt** (free, no domain
# purchase needed). After `terraform apply`, the ALB gets a public IP;
# `<dashed-ip>.nip.io` resolves to that IP via the free nip.io service.
# cert-manager watches the Ingress, runs an HTTP-01 challenge through
# the ALB, and writes the issued cert into the `tls.secretName` below.
#
# Two listeners on the ALB:
#   * :80 — used by cert-manager's HTTP-01 challenge AND for HTTP→HTTPS
#           redirect on user traffic.
#   * :443 — TLS-terminated with the cert-manager-issued cert.
#
# When you migrate to a real domain, switch the host below to your
# domain and OPTIONALLY swap to ACM by setting var.use_acm_cert = true
# in Terraform — that path doesn't go through cert-manager at all.
# ---------------------------------------------------------------------
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # TLS issuance via cert-manager — see deploy/terraform/aws/cert-manager.tf.
    # Use `letsencrypt-staging` while iterating (untrusted certs, 30k/wk),
    # then flip to `letsencrypt-prod` once it's working (trusted, 50/wk).
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Listen on both 80 and 443 — 80 is needed for the LE HTTP-01 challenge
    # (cert-manager creates a transient Ingress that needs port-80 reach).
    # ssl-redirect makes user traffic on 80 bounce to 443; the challenge
    # path /.well-known/acme-challenge/* is exempted by the ALB controller.
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"

    # 50 MiB matches the proxy_body_size in docs/deploy/kubernetes.md;
    # bundles can be large.
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60
    # Health check the /v1/healthz the server already exposes.
    alb.ingress.kubernetes.io/healthcheck-path: /v1/healthz
    alb.ingress.kubernetes.io/success-codes: "200"

  hosts:
    # CUSTOMISE — replace <dashed-ip> with the ALB's IP after
    # `kubectl get ingress -n skill-pool`. The first deploy uses
    # a placeholder so the chart renders; the second deploy uses
    # the real ALB hostname:
    #   helm upgrade skill-pool ... \
    #     --set ingress.hosts[0].host=skill-pool.54-220-123-45.nip.io
    - host: skill-pool.REPLACE-WITH-ALB-DASHED-IP.nip.io
      paths:
        # /v1/* and /metrics route to the server pod; everything else
        # goes to the SvelteKit web pod.
        - path: /v1
          pathType: Prefix
          service: server
        - path: /metrics
          pathType: Exact
          service: server
        - path: /
          pathType: Prefix
          service: web

  tls:
    enabled: true
    # cert-manager will create this Secret automatically and populate it
    # with the LE-issued cert. The chart's Ingress references it; the
    # ALB controller wires it to the listener.
    secretName: skill-pool-tls

# ---------------------------------------------------------------------
# Service account — bound to the IRSA role so the pod can read/write
# the S3 bundle bucket and pull the RDS password from Secrets Manager.
# ---------------------------------------------------------------------
serviceAccount:
  create: true
  name: skill-pool
  annotations:
    # CUSTOMISE — from `terraform output irsa_role_arn`
    eks.amazonaws.com/role-arn: ""

# ---------------------------------------------------------------------
# Server container env. The DB DSN + AES key come from a Secret the
# operator creates separately (see docs/deploy/aws.md §5). Everything
# below is non-sensitive.
# ---------------------------------------------------------------------
server:
  replicaCount: 2
  env:
    # CUSTOMISE — from `terraform output bundle_storage_uri`
    # Shape: s3://skill-pool-prod-bundles-<accountid>?region=eu-west-1
    SKILL_POOL_STORAGE_URI: ""
    SKILL_POOL_BIND: "0.0.0.0:8080"
    RUST_LOG: "info,skill_pool=info"
    RUST_LOG_FORMAT: "json"
  envFrom:
    # Created out-of-band — see docs/deploy/aws.md §5.
    # Keys: SKILL_POOL_DATABASE_URL, SKILL_POOL_EMAIL_SECRET_KEY
    - secretRef:
        name: skill-pool-env
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ---------------------------------------------------------------------
# Image registries. ECR — paste the URLs from Terraform outputs.
# Tags come from the GitHub Actions build workflow; defaults to "latest"
# but you should pin in CI.
# ---------------------------------------------------------------------
image:
  server:
    # CUSTOMISE — `terraform output ecr_server_repo_url`
    # Shape: <accountid>.dkr.ecr.<region>.amazonaws.com/skill-pool-server
    repository: ""
    tag: ""        # CUSTOMISE — set per-deploy by CI to the git SHA / version tag
    pullPolicy: IfNotPresent
  web:
    # CUSTOMISE — `terraform output ecr_web_repo_url`
    repository: ""
    tag: ""        # CUSTOMISE
    pullPolicy: IfNotPresent

# ---------------------------------------------------------------------
# Autoscaling: the chart wires an HPA on CPU at 70% utilisation; bump
# `maxReplicas` per real traffic. See docs/deploy/kubernetes.md.
# ---------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------
# Metrics: Prometheus ServiceMonitor enabled. Assumes you have
# kube-prometheus-stack installed; if not, set this `false` and scrape
# `/metrics` however your stack does it.
# ---------------------------------------------------------------------
metrics:
  serviceMonitor:
    enabled: true

# ---------------------------------------------------------------------
# Pod security defaults — non-root, read-only rootfs, no privilege esc.
# ---------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
