name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# PR job MUST NOT require AWS credentials. Pure linters + unit/integration
# tests + helm lint. No cloud access. Permissions stay minimal.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Rust: fmt + clippy + workspace tests against pgvector-equipped Postgres.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: skillpool
          POSTGRES_PASSWORD: skillpool
          POSTGRES_DB: skillpool
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skillpool"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Tests that don't spin up their own testcontainer can fall back to
      # the service container. Integration tests that use testcontainers
      # keep working — they go through the runner's docker socket.
      DATABASE_URL: postgres://skillpool:skillpool@localhost:5432/skillpool
      SKILL_POOL_DATABASE_URL: postgres://skillpool:skillpool@localhost:5432/skillpool
      RUST_BACKTRACE: 1
      # The capturer's anthropic.rs requires ANTHROPIC_API_KEY at runtime,
      # not at test time — its tests don't hit the live API. Leaving the
      # env var unset is the correct gate.

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install SAML C deps (xmlsec1 + libxml2 + libtool + clang)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev \
            libxmlsec1-dev \
            libxmlsec1-openssl \
            libtool-bin \
            libltdl-dev \
            clang \
            libclang-dev \
            pkg-config

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

      - name: Pre-pull Postgres image for testcontainers-using tests
        run: docker pull postgres:alpine

      - name: cargo test --workspace
        run: cargo test --workspace --verbose

  # ---------------------------------------------------------------------------
  # Web: prettier (lint) + svelte-check + vitest (a11y + unit).
  # ---------------------------------------------------------------------------
  web:
    name: Web (lint + check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: prettier --check
        run: npm run lint

      - name: svelte-check
        run: npm run check

      - name: vitest run
        run: npm test

  # ---------------------------------------------------------------------------
  # Helm: only runs if the chart has landed (sister subagent owns the chart).
  # Lints the chart and renders against a representative values shape,
  # then runs the rendered manifests through `kubectl apply --dry-run=client`.
  # ---------------------------------------------------------------------------
  helm:
    name: Helm (lint + template + dry-run)
    runs-on: ubuntu-latest
    # Gate: only runs when the chart actually exists in the tree.
    if: ${{ hashFiles('deploy/helm/skill-pool/Chart.yaml') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Set up kubectl (client-only, for --dry-run=client)
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: helm lint
        run: helm lint deploy/helm/skill-pool/

      - name: helm template | kubectl apply --dry-run=client
        run: |
          helm template skill-pool deploy/helm/skill-pool/ \
            --set image.server.tag=test \
            --set image.web.tag=test \
            --set server.env.SKILL_POOL_STORAGE_URI='s3://x' \
            --set web.env.ORIGIN='https://x.example.com' \
            | kubectl apply --dry-run=client -f -
