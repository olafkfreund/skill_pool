name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# PR job MUST NOT require AWS credentials. Pure linters + unit/integration
# tests + helm lint. No cloud access. Permissions stay minimal.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Rust: fmt + clippy + workspace tests against pgvector-equipped Postgres.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: skillpool
          POSTGRES_PASSWORD: skillpool
          POSTGRES_DB: skillpool
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skillpool"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Tests that don't spin up their own testcontainer can fall back to
      # the service container. Integration tests that use testcontainers
      # keep working — they go through the runner's docker socket.
      DATABASE_URL: postgres://skillpool:skillpool@localhost:5432/skillpool
      SKILL_POOL_DATABASE_URL: postgres://skillpool:skillpool@localhost:5432/skillpool
      RUST_BACKTRACE: 1
      # NIXPKGS_ALLOW_INSECURE bypasses the minio-abandoned gate that
      # nixpkgs-unstable currently surfaces. It's transitively pulled in
      # by the devshell (via opendal's optional s3 backend) even though
      # we never use it.
      NIXPKGS_ALLOW_INSECURE: "1"
      # The capturer's anthropic.rs requires ANTHROPIC_API_KEY at runtime,
      # not at test time — its tests don't hit the live API. Leaving the
      # env var unset is the correct gate.

    steps:
      - uses: actions/checkout@v4

      # Use the project's nix devshell instead of apt-installed system
      # libs. Closes #71 — samael 0.0.20 + libxmlsec1-dev 1.2.x (ubuntu's
      # version) produces a u32→usize type mismatch in samael's
      # hand-written xmlsec wrappers. The nix devshell pins libxmlsec1
      # 1.3.7 where `xmlSecSize = size_t = usize`, matching what samael
      # expects. Side benefit: every other build dep (libxml2, openssl,
      # pkg-config, rust toolchain) now matches local dev exactly.
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache nix-community substituter
        uses: cachix/cachix-action@v15
        with:
          name: nix-community

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-nix
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo fmt --all -- --check
        run: nix develop --impure --command cargo fmt --all -- --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: nix develop --impure --command cargo clippy --workspace --all-targets --no-deps -- -D warnings

      - name: Pre-pull Postgres image for testcontainers-using tests
        run: docker pull postgres:alpine

      - name: cargo test --workspace
        run: nix develop --impure --command cargo test --workspace --verbose

  # ---------------------------------------------------------------------------
  # Web: prettier (lint) + svelte-check + vitest (a11y + unit).
  # ---------------------------------------------------------------------------
  web:
    name: Web (lint + check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: prettier --check
        run: npm run lint

      - name: svelte-check
        run: npm run check

      - name: vitest run
        run: npm test

  # ---------------------------------------------------------------------------
  # Helm: only runs if the chart has landed (sister subagent owns the chart).
  # Lints the chart and renders against a representative values shape,
  # then runs the rendered manifests through `kubectl apply --dry-run=client`.
  # ---------------------------------------------------------------------------
  helm:
    name: Helm (lint + template + dry-run)
    runs-on: ubuntu-latest
    # Per-step gate: only does real work when the chart exists in the tree.
    # `hashFiles()` is illegal at the job-level `if:` (only valid in step
    # contexts), so we let the job start and short-circuit each step.
    steps:
      - uses: actions/checkout@v4

      - name: Detect chart presence
        id: chart
        run: |
          if [ -f deploy/helm/skill-pool/Chart.yaml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Helm chart not yet committed; skipping lint + template."
          fi

      - name: Set up Helm
        if: steps.chart.outputs.present == 'true'
        uses: azure/setup-helm@v5
        with:
          version: v3.15.0

      - name: helm lint
        if: steps.chart.outputs.present == 'true'
        run: helm lint deploy/helm/skill-pool/

      - name: helm template (yaml syntax + value coverage)
        if: steps.chart.outputs.present == 'true'
        # `helm template` alone catches every syntax error and missing
        # value. We previously piped to `kubectl apply --dry-run=client`,
        # but that requires reachable cluster API (kubectl pulls openapi
        # for resource recognition) and fails in CI without a target.
        # Helm-side validation is enough for chart-hygiene gating.
        run: |
          helm template skill-pool deploy/helm/skill-pool/ \
            --set image.server.tag=test \
            --set image.web.tag=test \
            --set server.env.SKILL_POOL_STORAGE_URI='s3://x' \
            --set web.env.ORIGIN='https://x.example.com' \
            > /dev/null

  # ---------------------------------------------------------------------------
  # Security: cargo audit — RustSec advisory database scan.
  #
  # Fetches the advisory database and checks Cargo.lock for:
  #   - Known CVEs / security advisories (exit 1 = fail)
  #   - Unmaintained crates (warning, do not fail)
  #   - Yanked crate versions (warning, do not fail)
  #
  # This job runs on push to main AND on every PR so advisories are caught
  # before merge. It does not require any cloud credentials.
  #
  # Known advisories suppressed via deny.toml ignore list (not here) so
  # cargo audit and cargo deny stay in sync.
  # ---------------------------------------------------------------------------
  cargo-audit:
    name: Security audit (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust
          # Read-only in non-main branches — saves cache space.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo audit
        # rustsec/audit-check creates per-advisory PR annotations and fails
        # the job on unignored vulnerabilities.  Advisories ignored in
        # deny.toml are also ignored here so both tools stay in sync.
        #
        # Ignored advisories (must mirror deny.toml [advisories].ignore):
        #   RUSTSEC-2026-0119 hickory-proto: upgrade blocked, hickory 0.26 not on crates.io
        #   RUSTSEC-2023-0071 rsa: no upstream fix; no RSA ops in our code paths
        #   RUSTSEC-2025-0119 number_prefix: unmaintained, fastembed optional dep only
        #   RUSTSEC-2024-0436 paste: unmaintained, fastembed optional dep only
        #   RUSTSEC-2025-0134 rustls-pemfile: unmaintained, redis upgrade will drop it
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Comma-separated, single line — multi-line YAML strings get
          # passed verbatim to `cargo audit --ignore X\nY\n...`, which
          # cargo-audit then rejects as a malformed advisory ID.
          ignore: RUSTSEC-2026-0119,RUSTSEC-2023-0071,RUSTSEC-2025-0119,RUSTSEC-2024-0436,RUSTSEC-2025-0134

  # ---------------------------------------------------------------------------
  # Security: cargo deny — license, bans, and source policy checks.
  #
  # Enforces the rules defined in deny.toml:
  #   - [advisories]  duplicate of cargo-audit for cross-validation
  #   - [licenses]    only explicitly allowed SPDX identifiers
  #   - [bans]        duplicate-version warnings, openssl-src banned
  #   - [sources]     only crates.io, no unknown registries
  #
  # Uses --all-features so optional dep trees (fastembed, otlp) are included.
  # The official EmbarkStudios action handles caching of the advisory DB.
  # ---------------------------------------------------------------------------
  cargo-deny:
    name: Dependency policy (cargo deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Check all four sections: advisories, licenses, bans, sources.
          command: check
          # Match the local dev command: include optional feature dep trees.
          arguments: --all-features
          # Use deny.toml at the repo root (default; explicit for clarity).
          manifest-path: Cargo.toml
