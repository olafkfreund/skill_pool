version: 2

# Weekly bumps for every ecosystem skill-pool ships against.
#
# - cargo: workspace Cargo.toml at repo root covers both server/ and cli/.
# - npm:   the SvelteKit frontend lives in web/.
# - github-actions: the workflows in .github/workflows/.

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      # Group routine patch/minor bumps to keep PR noise sane. Majors
      # still come through as individual PRs because they almost always
      # need code review anyway.
      cargo-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - web
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      npm-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
      include: scope
