# Traefik dynamic configuration for skill-pool with **per-tenant custom-domain
# ACME automation**. The thing Caddy doesn't do as smoothly: when an
# Enterprise tenant adds their own CNAME pointing at us, Traefik can request
# a cert for that hostname on-demand without a config push.
#
# Pair this with the static config below (or your existing traefik.yml).
# This file is meant to live in a directory Traefik watches via the
# `providers.file.directory` setting.

http:
  routers:
    skill-pool-portal:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.skill-pool.example.com`)"
      entryPoints: [websecure]
      service: skill-pool-web
      tls:
        certResolver: letsencrypt
        domains:
          - main: "skill-pool.example.com"
            sans: ["*.skill-pool.example.com"]

    skill-pool-api:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.skill-pool.example.com`) && (PathPrefix(`/v1/`) || Path(`/metrics`))"
      entryPoints: [websecure]
      service: skill-pool-api
      tls:
        certResolver: letsencrypt
      priority: 100  # Higher than the portal rule so /v1/* wins.

    # Per-tenant custom domains: any host that isn't skill-pool.example.com
    # is treated as a custom-domain tenant. Traefik issues a cert via
    # HTTP-01 on first request (after DNS is pointed at us).
    #
    # The `custom-domain-allow` middleware gates the request on the
    # registry's `cert-ok` allow-list — unverified hosts get 404'd
    # before Traefik attempts ACME issuance, defending against
    # cert-flood from random hosts pointed at us.
    skill-pool-custom-domain:
      rule: "!HostRegexp(`{any:.*}.skill-pool.example.com`) && !Host(`skill-pool.example.com`)"
      entryPoints: [websecure]
      service: skill-pool-web
      middlewares: [custom-domain-allow]
      tls:
        certResolver: letsencrypt
      priority: 1

  middlewares:
    # Calls the registry's cert-ok endpoint before forwarding a request.
    # 200 = host is in `verified`/`active` status (claimed via
    # /v1/tenant/custom-domains); anything else = refuse the request.
    # See `docs/enterprise/custom-domains.md`.
    custom-domain-allow:
      forwardAuth:
        address: "http://127.0.0.1:8080/v1/tenant/custom-domains/{Host}/cert-ok"
        trustForwardHeader: true

  services:
    skill-pool-web:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:3000"
        passHostHeader: true

    skill-pool-api:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8080"
        passHostHeader: true

