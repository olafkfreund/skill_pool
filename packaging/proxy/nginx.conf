# nginx.conf snippet for skill-pool — for the ops team that insists on nginx.
#
# Caddy is easier. Traefik is more flexible. nginx is here because some
# environments only allow nginx in the production traffic path. TLS termination
# is assumed to be handled externally (load balancer, cert-manager + ingress,
# or hand-managed certs).
#
# Drop the two server blocks below into /etc/nginx/sites-available/skill-pool
# and symlink into sites-enabled. Reload with `nginx -t && systemctl reload nginx`.

upstream skill_pool_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream skill_pool_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Apex (registry portal)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name skill-pool.example.com;

    ssl_certificate     /etc/letsencrypt/live/skill-pool.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skill-pool.example.com/privkey.pem;

    # Strict transport — disable until you've confirmed cert rotation works.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass http://skill_pool_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Tenant subdomains
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.skill-pool.example.com;

    # Wildcard cert — provision via certbot --dns-... or an external ACME client.
    ssl_certificate     /etc/letsencrypt/live/skill-pool.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skill-pool.example.com/privkey.pem;

    # API + metrics → registry server. Everything else → web portal.
    location ~ ^/(v1|metrics) {
        proxy_pass http://skill_pool_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Bundles can be tens of MB; let them stream.
        proxy_buffering off;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    location / {
        proxy_pass http://skill_pool_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name skill-pool.example.com *.skill-pool.example.com;
    return 301 https://$host$request_uri;
}
